<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3c.org/TR/html4/strict.dtd">
<html>
	<head>	
		<script type="text/javascript" src="../../../../../../Framework.js"></script>
		<script type="text/javascript" src="YesNoCancelDialog.js"></script>
		
		<script type="text/javascript">
			document.writeln("<title>");
			document.writeln(getURLParameters()['title']);
			document.writeln("</title>");
		</script>
		
		<style>
			body
			{
				background-color: buttonface;			
			}
			div
			{
				width: 100%;
				height: 100%;
				font-family: Tahoma;
				font-size: 8pt;
			}
			input
			{
				width: 80px;
				font-family: Tahoma;
				font-size: 8pt;
			}
		</style>
	</head>
    
  	<body onload="initialise()" onunload="dispose()">
    	<form>
			<div>
    		<table>
    			<tr height="10px"><td colspan="2"></td></tr>
    			<tr align="center">
    				<td style="padding-left: 10px">
    					<img src="../../../../../../images/warning.gif">
    				</td>
	    			<td>
						<script type="text/javascript">
							document.writeln(getURLParameters()['message']);
						</script>
	    			</td>
    			</tr>
    			<tr height="10px"><td colspan="2"></td></tr>
    			<tr align="center">
    				<td colspan="2">
						<input type="button" id="yesButton" value="Yes"/>
						<input type="button" id="noButton" value="No"/>
						<input type="button" id="cancelButton" value="Cancel"/>
					</td>
				</tr>
    			<tr height="10px"><td colspan="2"></td></tr>
			</table>
			</div>
		</form>
    </body>
</html>
