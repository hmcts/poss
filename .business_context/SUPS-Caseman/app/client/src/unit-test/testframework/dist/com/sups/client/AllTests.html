<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
  <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
     <title>Test page to run all unit tests for client framework</title>
    <link rel="stylesheet" type="text/css" href="/sample-apps/jsunit/css/jsUnitStyle.css">
    <script type="text/javascript" src="/sample-apps/jsunit/app/jsUnitCore.js"></script>
    <script type="text/javascript">
          // Define the entire test suite
      function suite()
      {
        var newSuite =  new top.jsUnitTestSuite();
                // Tests
		newSuite.addTestPage("../com/sups/client/controller/tests/AppController/testAppController.html");
		newSuite.addTestPage("../com/sups/client/controller/tests/Config/testFormConfig.html");
		newSuite.addTestPage("../com/sups/client/controller/tests/FormController-Services/testExceptionHandling.html");
		newSuite.addTestPage("../com/sups/client/controller/tests/SOAP/testSOAP.html");
		newSuite.addTestPage("../com/sups/client/controller/tests/Session/testSession.html");
		newSuite.addTestPage("../com/sups/client/model/tests/testDataModel.html");
		newSuite.addTestPage("../com/sups/client/model/xpathparser/tests/testXPathParser.html");

		return newSuite;
      }
    </script>
  </head>
    <body>
    <h1>JsUnit Test Suite</h1>
    <p>This page contains all the tests defined with the SUPS client framework</p>
  </body>
</html>
