<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<!--
Author: Sandeep Mullangi
Date: 18-02-2009
Description: This page acts a TestSuite used by TestRunner.html to group all the Caseman Client Test Pages. Any new test pages created should be included under coreSuite to be executed.
-->
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>JsUnit Test Suite</title>

    <link rel="stylesheet" type="text/css" href="../jsunit/app/css/jsUnitStyle.css">
    <script language="JavaScript" type="text/javascript" src="../jsunit/app/jsUnitCore.js"></script>
   
	<script language="JavaScript" type="text/javascript">

		/**
		* Includes all the test pages which should be executed by TestRunner.html
		**/
        function coreSuite() {
            var result = new top.jsUnitTestSuite();
			//should be relative to this TestRunner.html
            result.addTestPage("../screens/caseman_uc001/TestCreateUpdateCase.html");
            result.addTestPage("../screens/caseman_uc002/TestManageEventsCase.html");
			result.addTestPage("../screens/caseman_uc006/TestQueryByPartyCase.html");

            return result;
        }

        function suite() {
            var newsuite = new top.jsUnitTestSuite();
            newsuite.addTestSuite(coreSuite());
            return newsuite;
        }
    </script>
</head>

<body>
<h1>JsUnit Test Suite</h1>
