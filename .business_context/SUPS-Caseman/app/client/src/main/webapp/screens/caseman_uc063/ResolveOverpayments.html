<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3c.org/TR/html4/strict.dtd">
<html>
	<head>
		<title>ResolveOverpayments</title>
		<link href="ResolveOverpayments.css" type="text/css" rel="stylesheet">
		<script type="text/javascript" src="../../Framework.js"></script>
		<script type="text/javascript" src="../../CaseManIncludeFiles.js"></script>
		<script type="text/javascript" src="../../StartOfDayUtils.js"></script>
		<script type="text/javascript" src="ResolveOverpayments.js"></script>
		<script type="text/javascript" src="ResolveOverpaymentsMenuBar.js"></script>
		<script src="../../CaseManAsyncMonitorGUIAdaptor.js" type="text/javascript"></script>
		<script src="../../CaseManAsyncMonitorRenderer.js" type="text/javascript"></script>
	</head>
	
	<body tabindex="-1">
		<form name="ResolveOverpayments" id="ResolveOverpayments">
			
			<!-- Exit Button -->
			<div class="exitScreenAdaptor" id="exitScreenHandler"></div>
			
			<!-- Navigation Bar -->
			<table class="CaseManMenuBar">
				<tr>
					<td>
						<input id="Navigation_CreateCaseBtn" type="button" value="Cases">
						<input id="Navigation_WarrantsBtn" type="button" value="Warrants">
						<input id="Navigation_AeBtn" type="button" value="AE">
						<input id="Navigation_CoBtn" type="button" value="CO">
					</td>
				</tr>
			</table>
			
			<table class="layout">

				<!-- Header Panel -->
				<tr>
					<td>
						<div class="panel">
							<table class="content">
								<tr>
									<td>
										<table style="margin-right:5px; margin-top:5px; margin-bottom:5px;">
											<tr>
												<td class="headerLabel"><label for="Header_EnforcementNumber">Case/Enforcement Number</label></td>
												<td><input id="Header_EnforcementNumber" type="text" size="15" /></td>
												<td style="width:170px;">&nbsp;</td>
												<td class="headerLabel"><label for="Header_CourtCode">Payment Owning Court</label></td>
												<td><input id="Header_CourtCode" type="text" size="5" /></td>
												<td><input id="Header_CourtName" type="text" size="32" /></td>
											</tr>
											<tr>
												<td><label for="Header_EnforcementType">Case/Enforcement Type</label></td>
												<td><select id="Header_EnforcementType" /></td>
												<td style="width:170px;">&nbsp;</td>
												<td><label for="Header_TransactionNumber">Transaction Number</label></td>
												<td colspan="2"><input id="Header_TransactionNumber" type="text" size="15" /></td>
											</tr>
											<tr>
												<td colspan="6" align="right"><input id="Header_SearchBtn" type="button" value="Search" /></td>
											</tr>
										</table>
									</td>
								</tr>
							</table>
						</div>
					</td>
				</tr>
				<!-- End Header Panel -->
				
				<!-- Party Grid & Payment Amount Panel -->
				<tr>
					<td>
						<div class="panel">
							<table class="content">
								<tr>
									<td valign="top">
										<table>
											<tr>
												<td>
													<script type="text/javascript">
														Grid.createInline("Parties_Grid", ["Party Type", "Number", "Name"], 4, 1);
													</script>
												</td>
											</tr>
										</table>
									</td>
									
									<td class="spacer">&nbsp;</td>
									
									<td valign="top">
										<table style="margin-top:5px; margin-right:5px;">
											<tr>
												<td class="paymentLabel"><label for="Payment_Amount">Amount</label></td>
												<td>
													<input id="Payment_AmountCurrency" type="text" size="1">
													<input id="Payment_Amount" type="text" size="15" />
												</td>
											</tr>
											<tr><td colspan="2">&nbsp;</td></tr>
											<tr>
												<td class="paymentLabel"><label for="Payment_PaymentType">Payment Type</label></td>
												<td><input id="Payment_PaymentType" type="text" /></td>
											</tr>
											<tr>
												<td class="paymentLabel"><label for="Payment_RetentionType">Retention Type</label></td>
												<td><input id="Payment_RetentionType" type="text" /></td>
											</tr>
										</table>
									</td>
								</tr>
							</table>
						</div>
					</td>
				</tr>
				<!-- End Party Grid & Payment Amount Panel -->

				<!-- Payment Details Panel -->
				<tr>
					<td>
						<div class="panel">
							<table class="content">
								<tr>
									<td style="height:368px;" valign="top">
										<table style="margin-top:5px;">
											<tr>
												<td class="paymentDetailsLabel"><label for="Payee_OverpaymentAmount">Overpayment Amount</label></td>
												<td>
													<input id="Payee_OverpaymentAmountCurrency" type="text" size="1">
													<input id="Payee_OverpaymentAmount" type="text" size="15" />
												</td>
											</tr>
											<tr>
												<td class="paymentDetailsLabel"><label for="Payee_AmountNowDue">Amount Now Due to Party For</label></td>
												<td>
													<input id="Payee_AmountNowDueCurrency" type="text" size="1">
													<input id="Payee_AmountNowDue" type="text" size="15" />
												</td>
											</tr>
											<tr><td colspan="2">&nbsp;</td></tr>
											<tr>
												<td class="paymentDetailsLabel"><label for="Payee_Name">Overpayee</label></td>
												<td>
													<input id="Payee_Name" type="text" size="80" />&nbsp;
													<input id="Payee_LovBtn" type="button" value="LOV" />
												</td>
											</tr>
											<tr>
												<td class="paymentDetailsLabel"><label for="Payee_Address1">Address</label></td>
												<td><input id="Payee_Address1" type="text" size="60" /></td>
											</tr>
											<tr>
												<td>&nbsp;</td>
												<td><input id="Payee_Address2" type="text" size="60" /></td>
											</tr>
											<tr>
												<td>&nbsp;</td>
												<td><input id="Payee_Address3" type="text" size="60" /></td>
											</tr>
											<tr>
												<td>&nbsp;</td>
												<td><input id="Payee_Address4" type="text" size="60" /></td>
											</tr>
											<tr>
												<td>&nbsp;</td>
												<td><input id="Payee_Address5" type="text" size="60" /></td>
											</tr>
											<tr>
												<td class="paymentDetailsLabel"><label for="Payee_PostCode">Postcode</label></td>
												<td><input id="Payee_PostCode" type="text" size="15" /></td>
											</tr>
										</table>
									</td>
								</tr>
							</table>
						</div>
					</td>
				</tr>
				<!-- End Payment Details Panel -->

			</table>
	  
			<!-- Status Bar -->
			<script type="text/javascript">
				ActionBarRenderer.createInline(
					"status_bar",
					[
						{id: "Status_SaveBtn", label: "Save"},
						{id: "Status_ClearBtn", label: "Clear"},
						{id: "Status_CloseBtn", label: "Close"}
					]
				);
			</script>
			
			<!-- Async Monitor Popup -->									
			<div id="CaseMan_AsyncMonitorPopup" class="popup">
				<table id="popup_table">
					<tr class="hearing_header">
	        			<td align="center" class="hearing_heading" colspan="2">
	            			<div class="popup_header">Asynchronous Monitor</div>
	            		</td>
	        		</tr>
	        		<tr>
	        			<td>
							<script type="text/javascript">
								CaseManAsyncMonitorRenderer.createInline("CaseMan_AsyncMonitor", false);
							</script>
	            		</td>
	        		</tr>
				</table>
			</div>
					
			<!-- LOV Popups -->
			<script type="text/javascript">
				LOVPopupRenderer.createInline(
					"Lov_SearchResults",	"Payments",
					["Enforcement Type", "Transaction Number", "Enforcement Number"], 10, 1, true
				);
			</script>

			<script type="text/javascript">
				LOVPopupRenderer.createInline("Lov_Payee", "Overpayee", ["Role", "Party Name"], 10, 1, false);
			</script>
			
		</form>
	</body>
</html>
