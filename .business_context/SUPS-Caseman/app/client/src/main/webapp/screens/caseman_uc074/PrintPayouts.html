<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3c.org/TR/html4/strict.dtd">

<html>

	<head>
		<title>PrintPayouts</title>
		<link href="PrintPayouts.css" type="text/css" rel="stylesheet">
		<link rel="stylesheet" type="text/css" href="../caseman_oracle_reports/generated/OracleReports.css">
		<script type="text/javascript" src="../../Framework.js"></script>
		<script type="text/javascript" src="../../CaseManIncludeFiles.js"></script>
		
		<!-- 20 Apr 2006 - KG. As part of CR 0153, Added Asynchronisation logic to this module  -->
		<script src="../../CaseManAsyncMonitorGUIAdaptor.js" type="text/javascript"></script>
		<script src="../../CaseManAsyncMonitorRenderer.js" type="text/javascript"></script>		
		
    	<script type="text/javascript" src="PrintPayouts_Constants.js"></script>
		<script type="text/javascript" src="PrintPayouts_HelperFunctions.js"></script>
		<script type="text/javascript" src="PrintPayouts.js"></script>
	</head>
	
	
	<body tabindex="-1">
		<form name="PrintPayouts" id="printPayouts">
	
			<table class="CaseManMenuBar">
				<tr>
					<td>&nbsp;</td>
				</tr>
			</table>
		
			<!-- Header Panel -->
			<table class="layout">
				<tr>
					<td class="alignCentre">
						<div class="panel">
							<table class="headercontent">
								<tr>
									<td class="alignCentre">
										<table>
											<tr>
												<td style="width: 150px" align="left"><label>Owning Court</label></td><td style="width: 60px" align="left"><input size="5" type="text" id="OwningCourt_Code"></td><td style="width: 20px" align="left"><input size="20" type="text" id="OwningCourt_Name"></td>
											</tr>
										</table>
									</td>
								</tr>
							</table>
						</div>
					</td>
				</tr>
				
				<!-- Main Panel -->
				<tr>
					<td class="alignCentre">
						<div class="panel">
							<table class="content" style="height:534px;">
								<tr>
									<td class="alignCentre">
										<table>
											<tr>
												<td align="center">
												<textarea id="TextAreaBoilerPlateText" rows="18" cols="72" style="width: 400px; height: 300px; overflow:hidden">
												</textarea>	
												</td>
											</tr>
										</table>
									</td>
								</tr>													
								<tr>
									<td class="alignCentre">
										<table>
											<tr>
												<td><br><br><br></td>
												<td class="center">
													<input id="PayableOrderLineup_Button" type="Button" value="Print Payable Order Lineup"/>
												</td>
												<td class="center">
													<input id="PayableOrder_Button" type="Button" value="Print Payable Order"/>
												</td>
												<td class="center">
													<input id="PayableOrderSchedule_Button" type="Button" value="Print Schedules, Notification..."/>
												</td>
											</tr>
										</table>													
									</td>
								</tr>
								<tr>
									<td align="center">
										<br><br>
										<label>Please press the appropriate button or the Close button to Exit.<br></label>																								
									</td>
								</tr>
							</table>
						</div>
					</td>
				</tr>
			</table>    
	
	<!-- Footer Panel -->
	
			<!-- Footer Panel -->
			<script type="text/javascript">		
				ActionBarRenderer.createInline
				(
					"status_bar",
					[
						{id: "Status_Close_Btn", label: "Close"}
					]
				);
			</script>
										
			<!-- Progress Indicator Popup -->
			<div class="popup" id="ProgressIndicator_Popup">
				<div class="panel" id="ProgressIndicator_Panel">
					<table width="100%" class="content" cellspacing="5">
						<tr>
							<td>
								<label for="Progress_Bar">Generating Report</label>
							</td>
						</tr>
						<tr>
							<td>
								  <input id="Progress_Bar" type="text" size="67"/>
							</td>
						</tr>
						<tr>
							<td id="Progress_Status"></td>
						</tr>
					</table>
				</div>
				<div id="ProgressIndicator_ActionBarContainer">
					<script type="text/javascript">
						ActionBarRenderer.createInlineNoStatusBar(
							"ProgressIndicator_ActionBar",
							[
								{label: "Cancel", id: "Popup_Cancel"}
							]
						);	
					</script>	
				</div>
			</div>
			<!-- End Progress Indicator Popup -->
		
			<!-- SUBFORMS -->
			<div class="popup popupsubform" id="payableOrderSubform"></div>
			<div class="popup popupsubform" id="payableOrderScheduleSubform"></div>
											
			<!-- Exit Button -->
			<div class="exitScreenAdaptor" id="exitScreenHandler"></div>
	
		</form>
	</body>

</html>
