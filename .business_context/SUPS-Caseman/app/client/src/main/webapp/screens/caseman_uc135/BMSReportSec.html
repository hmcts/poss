<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3c.org/TR/html4/strict.dtd">

<html>

<head>
	<title>BMSReportSec</title>
    <link href="BMSReport.css" type="text/css" rel="stylesheet">
    <script type="text/javascript" src="../../Framework.js"></script>
	<script type="text/javascript" src="../../CaseManIncludeFiles.js"></script>
    <script type="text/javascript" src="BMSReportSec.js"></script>
</head>

<body>
  <form name="BMSReport" id="BMSReport">
	
	<!-- Framework Navigation Menu -->
	<script type="text/javascript">MenuBarRenderer.createInline();</script>
	
    <table class="layout">
      <tr>
        <td class="alignCentre">
			<div class="panel">
				<table class="headercontent">
					<tr>
						<td class="alignCentre">
							<table>
								<tr>
									<td style="width: 150px" align="left">
										<label>Owning Court</label>
									</td>
									<td style="width: 60px" align="left">
										<input size="5" type="text" id="OwningCourt_Code">
									</td>
									<td style="width: 20px" align="left">
										<input size="20" type="text" id="OwningCourt_Name">
									</td>
								</tr>
							</table>
						</td>
					</tr>
				</table>
			</div>
		</td>
	</tr>
	<tr>
		<td>
			<div class="panel">
				  <table class="rel3paramcontent">
					<!-- Report Parameters Panel -->
					<tr>
					  <td>
						<table style="width:100%;">
						  <tr>
							<td colspan="2">&nbsp;</td>
						  </tr>
						  <tr>
							<td colspan="2">&nbsp;</td>
						  </tr>
						  <tr>
							<td class=alignRight><label for='Params_StartDate_Txt'>Start Date&nbsp;</label></td>
							<td class=alignLeft>
							  <script type="text/javascript">
								DatePickerRenderer.createInline("Params_StartDate_Txt", false);
							  </script>
							</td>
						  </tr>
						  <tr>
							<td class=alignRight><label for='Params_EndDate_Txt'>End Date&nbsp;</label></td>
							<td class=alignLeft>
							   <script type="text/javascript">
								DatePickerRenderer.createInline("Params_EndDate_Txt", false);
							  </script>
							</td>
						  </tr>
						  <tr>
							<td class=alignRight><label for='Params_SectionName_Sel'>Section Name&nbsp;</label></td>
							<td class=alignLeft>
							  <input id="Params_SectionName_Sel" type="text" size="30">
							  <input id="Params_SectionName_SelLOVButton" type="Button" value="LOV"/>
							  <script type="text/javascript">
									LOVPopupRenderer.createInline( "Params_SectionName_SelLOVGrid", "Section Names", ["Id", "Description"], 10, 1, true );	
							  </script>
							</td>
						  </tr>
						  <tr><td colspan="2">&nbsp;</td></tr>
						  <tr>
							<td>&nbsp;</td>
							<td class="alignLeft"><input id="Params_PrintReport_Btn" type="button" value="Print Report"/></td>
						  </tr>                  
						  <!--  <tr><td colspan="2" class="alignCenter"><input id="showDom" type="button" value="Show DOM" onclick="javascript:CaseManUtils.showDOM();"/>&nbsp;</td></tr>  //-->
						</table>
					  </td>
					</tr>
					<!-- End Report Parameters Panel -->
				  </table>
			</div>
          
         </td>
      </tr>
    </table>

			<!-- Progress Indicator Popup -->
			<div class="popup" id="ProgressIndicator_Popup">
				<div class="panel" id="ProgressIndicator_Panel">
					<table class="content" cellspacing="5">
						<tr>
							<td>
								<label for="Progress_Bar">Generating Report</label>
							</td>
						</tr>
						<tr>
							<td>
						  		<input id="Progress_Bar" type="text" size="67"/>
							</td>
						</tr>
						<tr>
							<td id="Progress_Status"></td>
						</tr>
					</table>
				</div>
				<div id="ProgressIndicator_ActionBarContainer">
					<script type="text/javascript">
						ActionBarRenderer.createInlineNoStatusBar(
							"ProgressIndicator_ActionBar",
							[
								{label: "Cancel", id: "Popup_Cancel"}
							]
						);	
					</script>	
				</div>
			</div>
			<!-- End Progress Indicator Popup -->
	
	<!-- Status Bar Panel -->
	<script type="text/javascript">
		ActionBarRenderer.createInline(
			"status_bar",
			[
				{id: "Status_Close_Btn", label: "Close"}
			]
		);
	</script>
	<!-- End Status Bar Panel -->
  </form>
</body>

</html>
