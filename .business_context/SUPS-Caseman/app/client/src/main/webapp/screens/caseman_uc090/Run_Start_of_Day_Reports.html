<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3c.org/TR/html4/strict.dtd">

<html>

	<head>
		<title>Run_Start_of_Day_Reports</title>
		<link rel="stylesheet" type="text/css" href="../caseman_oracle_reports/generated/OracleReports.css">
		<script type="text/javascript" src="../../Framework.js"></script>
		<script type="text/javascript" src="../../CaseManIncludeFiles.js"></script>
		<script src="../../StartOfDayUtils.js" type="text/javascript"></script>
		<!-- 19 Apr 2006 - KG. As part of CR 0153, Added Asynchronisation logic to this module  -->
		<script src="../../CaseManAsyncMonitorGUIAdaptor.js" type="text/javascript"></script>
		<script src="../../CaseManAsyncMonitorRenderer.js" type="text/javascript"></script>
		<script src="Run_Start_of_Day_Reports.js" type="text/javascript"></script>  
	</head>

	<body>
		<form  name="OracleReportForm" id="OracleReportForm">
	
			<table class="CaseManMenuBar">
				<tr>
					 <td>&nbsp;</td>
				</tr>
			</table>
		
			<!-- Header Panel -->
			<table class="layout">
				<tr>
					<td class="alignCentre">
						<div class="panel">
							<table class="headercontent">
								<tr>
									<td class="alignCentre">
										<table>
											<tr>
												<td style="width: 150px" align="left"><label>Owning Court</label></td><td style="width: 60px" align="left"><input size="5" type="text" id="OwningCourt_Code"></td><td style="width: 20px" align="left"><input size="20" type="text" id="OwningCourt_Name"></td>
											</tr>
										</table>
									</td>
								</tr>
							</table>
						</div>
					</td>
				</tr>
				
				<!-- Main Panel -->
				<tr>
					<td class="alignCentre">
						<div class="panel">
							<table class="content" style="height:534px;">
								<tr>
									<td class="alignCentre">
										<table>
											<tr>
												<td align="center">
												<textarea id="TextAreaBoilerPlateText" rows="8" cols="60" style="width: 300px; height: 150px; overflow:hidden">
												</textarea>	
												</td>
											</tr>	
											<tr style="height:5px;">
												<td>&nbsp;</td>
											</tr>
											<tr>
												<td align="center">
													<label>Click on "Run Report" Button to run the start of day reports</label>
												</td>
											</tr>
										</table>
									</td>
								</tr>
							</table>
						</div>
					</td>
				</tr>
			</table>

			<!-- Status Bar -->
			<script type="text/javascript">		
				ActionBarRenderer.createInline
				(
					"status_bar",
					[
						{id: "Status_RunReportButton", label: "Run Report"},
						{id: "Status_Close_Btn", label: "Close"}
					]
				);
			</script>
											
			<!-- 19 Apr 2006 - KG. As part of CR 0153, Added Asynchronisation logic to this module  -->
			<div id="CaseMan_AsyncMonitorPopup" class="popup">
				<table id="popup_table">
					<tr class="hearing_header">
						<td align="center" class="hearing_heading" colspan="2">
							<div class="popup_header">Asynchronous Monitor</div>
						</td>
					</tr>
					<tr>
						<td>
							<script type="text/javascript">
								CaseManAsyncMonitorRenderer.createInline("CaseMan_AsyncMonitor", false);
							</script>
						</td>
					</tr>
				</table>
			</div>
		</form>
	</body>
</html>
