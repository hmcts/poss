<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3c.org/TR/html4/strict.dtd">

<html>
	
	<head>
		<title>MaintainPerDetails</title>
		<link href="MaintainPerDetails.css" type="text/css" rel="stylesheet">
		<script type="text/javascript" src="../../Framework.js"></script>
		<script type="text/javascript" src="../../CaseManIncludeFiles.js"></script>
		<script type="text/javascript" src="MaintainPerDetailsConstants.js"></script>
		<script type="text/javascript" src="MaintainPerDetailsHelperFunctions.js"></script>
		<script type="text/javascript" src="MaintainPerDetails.js"></script>
	</head>

	<body>
		<form name="MaintainPerDetails" id="maintainPerDetails">
		
		<!-- Framework Navigation Menu -->
		<script type="text/javascript">MenuBarRenderer.createInline();</script>
		
		<table class="layout">
					
			<!-- Header Panel -->
			<tr>
				<td>
					<div class="panel">
						<table class="content">
							<tr>
								<td>
									<table>
										
										<tr>									
											<td class="defaultLabel"><label for='Query_DetailCode'>Detail Code</label></td>										
											<td><input id="Query_DetailCode" type="text" size=15></td>
											<td style="width:50px;">&nbsp;</td>
																																	
											<td class="defaultLabel"><label for='Query_PERGroup'>PER Group</label></td>										
											<td><input id="Query_PERGroup" type="text" size=1></td>
											<td style="width:50px;">&nbsp;</td>
													
											<td class="defaultLabel"><label for='Query_PERCategory'>PER Category</label></td>										
											<td style="width:265px;"><input id="Query_PERCategory" type="text" size=1></td>
										</tr>

										<tr>
											<td class="defaultLabel"><label for='Query_AllowMultiples'>Allow Multiples</label></td>										
											<td colspan=2><input id="Query_AllowMultiples" type="checkbox"></td>

											<td class="defaultLabel"><label for='Query_OrderNumber'>Order Number</label></td>										
											<td colspan=2><input id="Query_OrderNumber" type="text" size=2></td>

											<td class="defaultLabel"><label for='Query_Prompt'>Prompt</label></td>										
											<td><input id="Query_Prompt" type="text" size=40></td>
										</tr>
													
										<tr>
											<td colspan=8 align="right">
												<input id="Query_AddPERDetailButton" type="Button" value="Add PER Detail" class="marginButton">
												<input id="Query_SearchButton" type="button" value="Search" class="marginButton">										   
											</td>
										</tr>
									
									</table>
								</td>			
							</tr>
						</table>
					</div>	    	
				</td>
			</tr>
			<!-- End Header Panel -->

			<!-- Start Result Panel -->
			<tr>
				<td>
					<div class="panel">
					<table class="content" style="height:476px;">
						<tr>
							<td valign="top">
								<table>
									<tr>
										<td>											 
											<script type="text/javascript">
												Grid.createInline("Master_PERDetailsGrid", ["Code", "Prompt", "Group", "Category"], 27, 1); 
											</script>
										</td>				    						
									</tr>			    					
								</table>							
							</td>
								    			
							<td class="spacer">&nbsp;</td>
										    
							<td valign="top" style="width:460px;">			    		
								<table>
									<tr>
										<td valign="top">						    			
											<table>
												<tr>																																				
													<td class="defaultLabel"><label for='PERDetail_DetailCode'>Detail Code</label></td>										
													<td><input id="PERDetail_DetailCode" type="text" size=15></td>																				
												</tr>
												<tr>
													<td class="defaultLabel"><label for='PERDetail_PERGroup'>PER Group</label></td>										
													<td><input id="PERDetail_PERGroup" type="text" size=1></td>
												</tr>
												<tr>
													<td class="defaultLabel"><label for='PERDetail_PERCategory'>PER Category</label></td>										
													<td><input id="PERDetail_PERCategory" type="text" size=1></td>
												</tr>
												<tr>
													<td class="defaultLabel"><label for='PERDetail_AllowMultiples'>Allow Multiples</label></td>										
													<td><input id="PERDetail_AllowMultiples" type="checkbox"></td>
												</tr>
												<tr>
													<td class="defaultLabel"><label for='PERDetail_OrderNumber'>Order Number</label></td>										
													<td><input id="PERDetail_OrderNumber" type="text" size=2></td>
												</tr>
												<tr>
													<td class="defaultLabel"><label for='PERDetail_Prompt'>Prompt</label></td>										
													<td><input id="PERDetail_Prompt" type="text" size=40></td>
												</tr>	 
												<tr>
													<td class="PERDetail_AmountAllowedEditableLabel"><label for='PERDetail_AmountAllowedEditable'>Amount Allowed Editable</label></td>										
													<td><input id="PERDetail_AmountAllowedEditable" type="checkbox"></td>
												</tr>												
											</table>								
										</td>
									</tr>
								</table>
							</td>
						</tr>
					</table>
					</div>
				</td>    		
			</tr>
			<!-- End Address List and Details Panel -->
		</table>
		
		<!-- Status Bar Panel -->
		<script type="text/javascript">
			ActionBarRenderer.createInline(
				"status_bar",
				[
					{id: "Status_SaveButton", label: "Save"},
					{id: "Status_ClearButton", label: "Clear"},
					{id: "Status_CloseButton", label: "Close"}
				]
			);
		</script>
		<!-- End Status Bar Panel -->
	
		<!-- SUBFORMS -->
		<div class="popup popupsubform" id="addNewPerDetail_subform"></div>
														
	   </form>
	
	</body>

</html>
