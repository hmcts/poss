<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3c.org/TR/html4/strict.dtd">

<html>

	<head>
		<title>CreateHomeWarrants</title>
		<link href="CreateHomeWarrants.css" type="text/css" rel="stylesheet">
		<script type="text/javascript" src="../../Framework.js"></script>
		<script type="text/javascript" src="../../ConcatCommon.js"></script>
		<script type="text/javascript" src="CreateHomeWarrants.js"></script>
		<script type="text/javascript" src="CreateHomeWarrants_MenuBarCode.js"></script>
	</head>

	<body>
		<form name="CreateHomeWarrants" id="createHomeWarrants">
			
			<!-- Framework Navigation Menu -->
			<script type="text/javascript">MenuBarRenderer.createInline();</script>
			
			<table class="layout">
				<!-- Header Panel -->
				<tr>
					<td>
						<div class="panel">
							<table class="content">
								<tr>
									<td>
										<table>
											<tr>
												<td class="defaultLabel"><label for="Header_CaseNumber">Case Number</label></td>
												<td><input id="Header_CaseNumber" type="text" size="15"/></td>
												<td style="width:169px;">&nbsp;</td>
												<td class="defaultLabel"><label for="Header_WarrantType">Warrant Type</label></td>
												<td colspan="2">
													<select id="Header_WarrantType"></select>
													<input id="Header_WarrantTypeLOVButton" type="Button" value="LOV"/>
												</td>
											</tr>
											<tr>
												<td class="defaultLabel"><label for="Header_DateRequestReceived">Date Request Received</label></td>
												<td><script type="text/javascript">DatePickerRenderer.createInline("Header_DateRequestReceived", false);</script></td>
												<td style="width:169px;">&nbsp;</td>
												<td class="defaultLabel"><label for="Header_IssuedByCourtCode">Issued By</label></td>
												<td><input id="Header_IssuedByCourtCode" type="text" size="5"/></td>
												<td><script type="text/javascript">AutoCompletionRenderer.createInline("Header_IssuedByCourtName");</script></td>
											</tr>
										</table>
									</td>
								</tr>
							</table>
						</div>
					</td>
				</tr>
				<!-- End Header Panel -->
							
				<!-- Main Panel -->
				<tr>
					<td>
						<div class="panel">
							<table class="content" style="height:480px;">
								<tr>
									<td valign="top" style="width:475px;">
										<!-- Claimants Panel -->
										<table style="margin-top:5px;">
											<tr>
												<td class="defaultLabel" valign="top"><label for="ClaimantsGrid">Select Party For</label></td>
												<td colspan="3">
													<script type="text/javascript">Grid.createInline("ClaimantsGrid", ["Number", "Type", "Name"], 3, 1);</script>
												</td>
											</tr>								
											<tr>
												<td class="defaultLabel"><label id="Claimant_Name_Label" for="Claimant_Name">Party For</label></td>
												<td colspan="3"><input id="Claimant_Name" type="text" size="50"/></td>
											</tr>
											<tr>
												<td class="defaultLabel"><label id="Solicitor_Name_Label" for="Solicitor_Name">Party For (sol)</label></td>
												<td colspan="3"><input id="Solicitor_Name" type="text" size="50"/></td>
											</tr>
											<tr>
												<td class="defaultLabel"><label for='Solicitor_Address_Line1'>Address</label></td>
												<td colspan="3"><input id="Solicitor_Address_Line1" type="text" size="50"/></td>
											</tr>
											<tr>
												<td>&nbsp;</td>
												<td colspan="3"><input id="Solicitor_Address_Line2" type="text" size="50"/></td>
											</tr>
											<tr>
												<td>&nbsp;</td>
												<td colspan="3"><input id="Solicitor_Address_Line3" type="text" size="50"/></td>
											</tr>
											<tr>
												<td>&nbsp;</td>
												<td colspan="3"><input id="Solicitor_Address_Line4" type="text" size="50"/></td>
											</tr>
											<tr>
												<td>&nbsp;</td>
												<td colspan="3"><input id="Solicitor_Address_Line5" type="text" size="50"/></td>
											</tr>
											<tr>
												<td class="defaultLabel"><label for='Solicitor_Address_PostCode'>Postcode</label></td>
												<td colspan="3"><input id="Solicitor_Address_PostCode" type="text" size="15"/></td>
											</tr>
											<tr>
												<td class="defaultLabel"><label for='Solicitor_DX'>DX Number</label></td>
												<td colspan="3"><input id="Solicitor_DX" type="text" size="50"/></td>
											</tr>
											<tr>
												<td class="defaultLabel"><label for='Solicitor_TelephoneNumber'>Telephone Number</label></td>
												<td colspan="3"><input id="Solicitor_TelephoneNumber" type="text" size="50"/></td>
											</tr>
											<tr>
												<td class="defaultLabel"><label for='Solicitor_FaxNumber'>Fax Number</label></td>
												<td colspan="3"><input id="Solicitor_FaxNumber" type="text" size="50"/></td>
											</tr>
											<tr>
												<td class="defaultLabel"><label for='Solicitor_EmailAddress'>Email Address</label></td>
												<td colspan="3"><input id="Solicitor_EmailAddress" type="text" size="50"/></td>
											</tr>
											<tr>
												<td class="defaultLabel"><label for="Solicitor_Reference">Reference</label></td>
												<td colspan="3"><input id="Solicitor_Reference" type="text" size="50"/></td>
											</tr>
											<tr>
												<td colspan="4">&nbsp;</td>
											</tr>									
											<tr>
												<td colspan="4"><hr/></td>
											</tr>
											<tr>
												<td class="defaultLabel"><label for="ExecutingCourtCode">Executed By</label></td>
												<td colspan="3">
													<table cellpadding="0" cellspacing="0">
													<tr>
														<td>
															<input id="ExecutingCourtCode" type="text" size="5"/>&nbsp;
														</td>
														<td>
															<script type="text/javascript">AutoCompletionRenderer.createInline("ExecutingCourtName");</script>
														</td>
														<td>&nbsp;<input id="ExecutingCourtLOVButton" type="Button" value="LOV"/></td>
													</tr>
													</table>
												</td>											
											</tr>
											<tr>
												<td class="defaultLabel"><label for="BailiffAreaNo">Bailiff area no</label></td>
												<td colspan="3"><input id="BailiffAreaNo" type="text" size="5"/></td>
											</tr>
										</table>
										<!-- End Claimants Panel -->                                
									</td>
		
									<td class="spacer">&nbsp;</td>
		
									<td valign="top">
										<!-- Defendants Panel -->
										<table style="margin-top:5px;">
											<tr>
												<td class="defaultLabel" valign="top"><label for="DefendantsGrid">Select Parties Against</label></td>
												<td>
													<script type="text/javascript">Grid.createInline("DefendantsGrid", ["Number", "Type", "Name"], 3, 1);</script>
												</td>
											</tr>								
											<!-- Defendant 1 -->
											<tr>
												<td class="defaultLabel"><label id="Defendant1_Name_Label" for="Defendant1_Name">Party Against 1</label></td>
												<td><input id="Defendant1_Name" type="text" size="50"/></td>
											</tr>
											<tr>
												<td class="defaultLabel"><label for='Defendant1_Address_Line1'>Address</label></td>
												<td><input id="Defendant1_Address_Line1" type="text" size="50"/></td>
											</tr>
											<tr>
												<td>&nbsp;</td>
												<td><input id="Defendant1_Address_Line2" type="text" size="50"/></td>
											</tr>
											<tr>
												<td>&nbsp;</td>
												<td><input id="Defendant1_Address_Line3" type="text" size="50"/></td>
											</tr>
											<tr>
												<td>&nbsp;</td>
												<td><input id="Defendant1_Address_Line4" type="text" size="50"/></td>
											</tr>
											<tr>
												<td>&nbsp;</td>
												<td><input id="Defendant1_Address_Line5" type="text" size="50"/></td>
											</tr>
											<tr>
												<td class="defaultLabel"><label for='Defendant1_Address_PostCode'>Postcode</label></td>
												<td><input id="Defendant1_Address_PostCode" type="text" size="15"/></td>
											</tr>
		
											<!-- Defendant 2 -->
											<tr>
												<td class="defaultLabel"><label id="Defendant2_Name_Label" for="Defendant2_Name">Party Against 2</label></td>
												<td><input id="Defendant2_Name" type="text" size="50"/></td>
											</tr>
											<tr>
												<td class="defaultLabel"><label for='Defendant2_Address_Line1'>Address</label></td>
												<td><input id="Defendant2_Address_Line1" type="text" size="50"/></td>
											</tr>
											<tr>
												<td>&nbsp;</td>
												<td><input id="Defendant2_Address_Line2" type="text" size="50"/></td>
											</tr>
											<tr>
												<td>&nbsp;</td>
												<td><input id="Defendant2_Address_Line3" type="text" size="50"/></td>
											</tr>
											<tr>
												<td>&nbsp;</td>
												<td><input id="Defendant2_Address_Line4" type="text" size="50"/></td>
											</tr>
											<tr>
												<td>&nbsp;</td>
												<td><input id="Defendant2_Address_Line5" type="text" size="50"/></td>
											</tr>
											<tr>
												<td class="defaultLabel"><label for='Defendant2_Address_PostCode'>Postcode</label></td>
												<td><input id="Defendant2_Address_PostCode" type="text" size="15"/></td>
											</tr>
											<tr>
												<td colspan="2"><hr/></td>
											</tr>
											<tr>
												<td class="defaultLabel" valign="top"><label for="Additional_Notes">Additional Notes</label></td>
												<td><script type="text/javascript">ZoomFieldRenderer.createInline("Additional_Notes");</script></td>
											</tr>                                    
										</table>
										<!-- End Defendants Panel -->                                
									</td>
								</tr>
							</table>
						</div>
					</td>
				</tr>
				<!-- End Main Panel -->
	
				  <!-- Footer Panel -->
				<tr>
					<td>
						<div class="panel">
							<table class="content">
								<tr>
									<td class="defaultLabel"><label for="Footer_DetailsOfWarrantButton">Details of Warrant</label></td>
									<td><input id="Footer_DetailsOfWarrantButton" type="button" value="Add Details" class="addUpdateButton"/></td>
								</tr>
							</table>
						</div>
					</td>
				</tr>
				<!-- End Footer Panel -->
			</table>
	
			<!-- Status Bar Panel -->
			<script type="text/javascript">
				ActionBarRenderer.createInline(
					"status_bar",
					[
						{id: "Status_SaveButton", label: "Save"},
						{id: "Status_ClearButton", label: "Clear"},
						{id: "Status_CloseButton", label: "Close"}
					]
				);
			</script>
			<!-- End Status Bar Panel -->
			
			
			
			<!-- Warrant Details Form Extension -->
			<div class="popup" id="Warrant_Details_Popup">
				<table class="content">
					<tr>
						<td><label for="WarrantDetails_BalanceOfDebt">Balance of Debt</label></td>
						<td>
							<input type="text" id="WarrantDetails_BalanceOfDebtCurrency" size="1" style="margin-top:5px;"/>&nbsp;
							<input type="text" id="WarrantDetails_BalanceOfDebt" size="15" style="margin-top:5px;"/>
						</td>
					</tr>
					<tr>
						<td colspan="2"><hr/></td>
					</tr>
					<tr>
						<td><label for="WarrantDetails_AmountOfWarrant">Amount of Warrant</label></td>
						<td>
							<input type="text" id="WarrantDetails_AmountOfWarrantCurrency" size="1"/>&nbsp;
							<input type="text" id="WarrantDetails_AmountOfWarrant" size="15"/>
						</td>
					</tr>
					<tr>
						<td><label for="WarrantDetails_Fee">Fee</label></td>
						<td>
							<input type="text" id="WarrantDetails_FeeCurrency" size="1"/>&nbsp;
							<input type="text" id="WarrantDetails_Fee" size="15"/>
						</td>
					</tr>
					<tr>
						<td><label for="WarrantDetails_SolicitorsCosts">Solicitor's Costs</label></td>
						<td>
							<input type="text" id="WarrantDetails_SolicitorsCostsCurrency" size="1"/>&nbsp;
							<input type="text" id="WarrantDetails_SolicitorsCosts" size="15"/>
						</td>
					</tr>
					<tr>
						<td><label for="WarrantDetails_LandRegistryFee">Land Registry Fee</label></td>
						<td>
							<input type="text" id="WarrantDetails_LandRegistryFeeCurrency" size="1"/>&nbsp;
							<input type="text" id="WarrantDetails_LandRegistryFee" size="15"/>
						</td>
					</tr>
					<tr>
						<td colspan="2"><hr/></td>
					</tr>				
					<tr>
						<td><label for="WarrantDetails_Total">Total</label></td>
						<td>
							<input type="text" id="WarrantDetails_TotalCurrency" size="1"/>&nbsp;
							<input type="text" id="WarrantDetails_Total" size="15"/>
						</td>
					</tr>
					<tr>
						<td colspan="2"><hr/></td>
					</tr>
					<tr>
						<td><label for="WarrantDetails_BalanceAfterPaid">Balance of debt<br/>&nbsp;after warrant paid</label></td>
						<td>
							<input type="text" id="WarrantDetails_BalanceAfterPaidCurrency" size="1"/>&nbsp;
							<input type="text" id="WarrantDetails_BalanceAfterPaid" size="15"/>
						</td>
					</tr>
					<tr><td colspan="2">&nbsp;</td></tr>
					<tr>
						<td colspan="2" align="right">
							<input type="button" value="Ok" id="WarrantDetails_OkButton" style="margin-right:5px; margin-bottom:5px;"/>
							<input type="button" value="Cancel" id="WarrantDetails_CancelButton" style="margin-right:5px; margin-bottom:5px;"/>
						</td>
					</tr>                
				</table>
			</div>
			<!-- End Warrant Details Form Extension -->
	
			<div class="logic" id="defaultClaimantLogic"></div>
			<div class="logic" id="defaultDefendantLogic"></div>
	
			<!-- LOV POPUPs -->
			<script type="text/javascript">LOVPopupRenderer.createInline( "WarrantTypeLOVGrid", "Warrant Types", ["Type", "Description"], 10, 1, true );</script>        
			<script type="text/javascript">LOVSubformRenderer.createInline( "CourtsLOVGrid", "Courts", ["Code", "Court"], 10, 1, true );</script>        
		</form>
	</body>
</html>
