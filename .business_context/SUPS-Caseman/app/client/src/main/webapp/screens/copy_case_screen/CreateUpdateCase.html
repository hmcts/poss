				<!-- Footer Panel -->
				<tr>
					<td>
						<div class="panel">
							<table class="content">

					]
				);
			</script>
			<!-- End Status Bar Panel -->
	
			<!--  Form Extension Popups -->
	
			<!-- Notification Date popup -->
			<div class="popup" id="Create_Copy_Popup">
				<table class="content">

					</tr>
					<tr>
						<td class="defaultLabel" nowrap><label for='CreateCopyPopup_OwningCourtCode'>New Owning Court</label></td>

							<input id="CreateCopyPopup_OwningCourtCode" type="text" size="5"/>

							<script type="text/javascript">AutoCompletionRenderer.createInline("CreateCopyPopup_OwningCourtName");</script>
