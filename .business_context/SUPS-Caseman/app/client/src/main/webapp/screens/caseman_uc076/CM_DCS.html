<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3c.org/TR/html4/strict.dtd">
<html>
	<head>
		<title>CM_DCS</title>
		<link rel="stylesheet" type="text/css" href="../caseman_oracle_reports/generated/OracleReports.css">
		<script type="text/javascript" src="../../Framework.js"></script>
		<script type="text/javascript" src="../../CaseManIncludeFiles.js"></script>
		<script src="../../StartOfDayUtils.js" type="text/javascript"></script>
		<script src="CM_DCS.js" type="text/javascript">/** **/</script>
	</head>

	<body tabindex="-1">
		<form action="#" name="OracleReportForm" id="OracleReportForm">
			<!-- Navigation -->
			<table class="CaseManMenuBar">
				<tr>
					<td>&nbsp;</td>
				</tr>
			</table>

			<table class="layout">
				<tr>
					<td class="alignCentre">
						<div class="panel">
							<table class="headercontent">
								<tr>
									<td class="alignCentre">
										<table>
											<tr>
												<td style="width: 150px" align="left"><label>Owning Court</label></td><td style="width: 60px" align="left"><input size="5" type="text" id="OwningCourt_Code"></td><td style="width: 20px" align="left"><input size="20" type="text" id="OwningCourt_Name"></td>
											</tr>
										</table>
									</td>
								</tr>
							</table>
						</div>
					</td>
				</tr>
				<tr>
					<td class="alignCentre">
						<div class="panel">
							<table class="content" style="height:534px;">
								<tr>
									<td class="alignCentre">
										<!--1-->
										<!--CM_DCS_GROUP_001-->
										<table>
											<!--../Questions/CM_DCS_QUESTION_1.xml-->
											<tr>
												<td colspan="2" style="width: 650px" align="center"><label>Click on Run Report button to print this report.</label></td>
											</tr>
										</table>
									</td>
								</tr>
							</table>
						</div>
					</td>
				</tr>
			</table>

			<script type="text/javascript">		
				ActionBarRenderer.createInline(
					"status_bar",
					[
						{id: "Status_RunReportButton", label: "Run Report"},
						{id: "Status_Close_Btn", label: "Close"}
					]
				);
			</script>
												
			<!-- Progress Indicator Popup -->
			<div class="popup" id="ProgressIndicator_Popup">
				<div class="panel" id="ProgressIndicator_Panel">
					<table class="content" cellspacing="5">
						<tr>
							<td>
								<label for="Progress_Bar">Generating Report</label>
							</td>
						</tr>
						<tr>
							<td>
						  		<input id="Progress_Bar" type="text" size="67"/>
							</td>
						</tr>
						<tr>
							<td id="Progress_Status"></td>
						</tr>
					</table>
				</div>
				<div id="ProgressIndicator_ActionBarContainer">
					<script type="text/javascript">
						ActionBarRenderer.createInlineNoStatusBar(
							"ProgressIndicator_ActionBar",
							[
								{label: "Cancel", id: "Popup_Cancel"}
							]
						);	
					</script>	
				</div>
			</div>

		</form>
	</body>
</html>
