<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3c.org/TR/html4/strict.dtd">
<html>

	<head>
		<title>CodedPartySearch_SubForm</title>
    	<link href="CodedPartySearch_SubForm.css" type="text/css" rel="stylesheet">
    	<script type="text/javascript" src="../../Framework.js"></script>
		<script type="text/javascript" src="../../ConcatCommon.js"></script>
		<script type="text/javascript" src="CodedPartySearch_SubForm.js"></script>
  	</head>

	<body>
	
    	<form id="codedPartySearchSubform" class="subform">

			<div class="cpPopupTitle">Coded Party Search</div>

			<div class="panel">
				<table class="content">
					<tr>
						<td class="defaultLabel"><label for='CodedPartySearch_Name'>Party Name</label></td>
						<td><input id="CodedPartySearch_Name" type="text" size=40></td>
					</tr>
					<tr>
						<td align="right" colspan="2"><input id="CodedPartySearch_SearchButton" type="button" value="Search" style="margin: 5px;"/></td>
					</tr>
				</table>
			</div>

			<div class="panel">
				<script type="text/javascript">Grid.createInline("CodedPartySearch_ResultsGrid", ["Code", "Name", "Address"], 10, 1);</script>
			</div>
			
			<!-- Popup action bar -->
			<script type="text/javascript">
				ActionBarRenderer.createInlineNoStatusBar(
					"codedpartysearch_statusbar",
					[
						{id: "CodedPartySearch_PreviousButton", label: "Previous"},	
						{id: "CodedPartySearch_NextButton", label: "Next"},
						{id: "CodedPartySearch_OkButton", label: "Ok"},
						{id: "CodedPartySearch_CancelButton", label: "Cancel"}
					]
				);
			</script>
			
		</form>
    
    </body>
    
</html>
