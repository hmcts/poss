<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3c.org/TR/html4/strict.dtd">
<html>
	<head>
		<title>AdhocPayouts</title>
		<link href="AdhocPayouts.css" type="text/css" rel="stylesheet">
		<script type="text/javascript" src="../../Framework.js"></script>
		<script type="text/javascript" src="../../CaseManIncludeFiles.js"></script>
		<script type="text/javascript" src="../../StartOfDayUtils.js"></script>
		<script type="text/javascript" src="AdhocPayouts.js"></script>
		<script src="../../CaseManAsyncMonitorGUIAdaptor.js" type="text/javascript"></script>
		<script src="../../CaseManAsyncMonitorRenderer.js" type="text/javascript"></script>
	</head>
	
	<body tabindex="-1">
		<form name="AdhocPayouts" id="AdhocPayouts">
			
			<!-- Exit Button -->
			<div class="exitScreenAdaptor" id="exitScreenHandler"></div>
			
			<!-- Navigation -->
			<table class="CaseManMenuBar">
				<tr>
					<td>&nbsp;</td>
				</tr>
			</table>
			
			<table class="layout">

				<!-- Header Panel -->
				<tr>
					<td>
						<div class="panel">
							<table class="content">
								<tr>
									<td>
										<table style="margin-right:5px; margin-top:5px; margin-bottom:5px;">
											<tr>
												<td class="headerLabel"><label for="Header_EnforcementNumber">Case/Enforcement Number</label></td>
												<td><input id="Header_EnforcementNumber" type="text" size="15" /></td>
												<td style="width:170px;">&nbsp;</td>
												<td class="headerLabel"><label for="Header_CourtCode">Payment Owning Court</label></td>
												<td><input id="Header_CourtCode" type="text" size="5" /></td>
												<td><input id="Header_CourtName" type="text" size="32" /></td>
											</tr>
											<tr>
												<td><label for="Header_EnforcementType">Case/Enforcement Type</label></td>
												<td><select id="Header_EnforcementType" /></td>
												<td style="width:170px;">&nbsp;</td>
												<td><label for="Header_TransactionNumber">Transaction Number</label></td>
												<td colspan="2"><input id="Header_TransactionNumber" type="text" size="15" /></td>
											</tr>
											<tr>
												<td colspan="6" align="right"><input id="Header_SearchBtn" type="button" value="Search" /></td>
											</tr>
										</table>
									</td>
								</tr>
							</table>
						</div>
					</td>
				</tr>
				<!-- End Header Panel -->

				
				<!-- Party Grid & Payment Amount Panel -->
				<tr>
					<td>
						<div class="panel">
							<table class="content">
								<tr>
									<td valign="top">
										<table>
											<tr>
												<td>
													<script type="text/javascript">
														Grid.createInline("Parties_Grid", ["Party Type", "Number", "Name"], 7, 1);
													</script>
												</td>
											</tr>
										</table>
									</td>
									
									<td class="spacer">&nbsp;</td>
									
									<td valign="top">
										<table style="margin-top:5px; margin-right:5px; margin-bottom:5px;">
											<tr>
												<td class="defaultLabel"><label for="Payment_Amount">Amount</label></td>
												<td>
													<input id="Payment_AmountCurrency" type="text" size="1">
													<input id="Payment_Amount" type="text" size="15" />
												</td>
											</tr>
											<tr>
												<td class="defaultLabel"><label for="Payment_PaymentType">Payment Type</label></td>
												<td><input id="Payment_PaymentType" type="text" size="10" /></td>
											</tr>
											<tr>
												<td class="defaultLabel"><label for="Payment_RetentionType">Retention Type</label></td>
												<td><input id="Payment_RetentionType" type="text" size="40" /></td>
											</tr>
											<tr>
												<td class="defaultLabel"><label for="Payment_OverpaymentAmount">Overpayment Amount</label></td>
												<td>
													<input id="Payment_OverpaymentAmountCurrency" type="text" size="1">
													<input id="Payment_OverpaymentAmount" type="text" size="15" />
												</td>
											</tr>
											<tr>
												<td class="defaultLabel"><label for="Payment_Date">Payment Date</label></td>
												<td>
													<script type="text/javascript">
														DatePickerRenderer.createInline("Payment_Date", true);
													</script>
												</td>
											</tr>
											<tr>
												<td class="defaultLabel"><label for="Payment_ReleaseDate">Release Date</label></td>
												<td>
													<script type="text/javascript">
														DatePickerRenderer.createInline("Payment_ReleaseDate", true);
													</script>
												</td>
											</tr>
										</table>
									</td>
								</tr>
							</table>
						</div>
					</td>
				</tr>
				<!-- End Party Grid & Payment Amount Panel -->

				<!-- Payment Details Panel -->
				<tr>
					<td>
						<div class="panel">
							<table class="content">
								<tr>
									<td style="height:320px;" valign="top">
										<table style="margin-top:5px;">
											<tr>
												<td class="paymentDetailsLabel"><label for="Payout_Reason">Reason for Payout</label></td>
												<td>
													<select id="Payout_Reason">
														<option></option>
														<option>ADHOC PAYOUT</option>
														<option>PAID IN ERROR</option>
													</select>
												</td>
											</tr>
											<tr>
												<td class="paymentDetailsLabel"><label for="Payout_Date">Payout Date</label></td>
												<td>
													<script type="text/javascript">
														DatePickerRenderer.createInline("Payout_Date", true);
													</script>
												</td>
											</tr>
											<tr>
												<td class="paymentDetailsLabel"><label for="Payout_Notes">Notes/Reason for Adhoc Payout</label></td>
												<td>
													<script type="text/javascript">
														ZoomFieldRenderer.createInline("Payout_Notes", 10, 100);
													</script>
												</td>
											</tr>
										</table>
									</td>
								</tr>
							</table>
						</div>
					</td>
				</tr>
				<!-- End Payment Details Panel -->

			</table>
	  
			<!-- Status Bar -->
			<script type="text/javascript">
				ActionBarRenderer.createInline(
					"status_bar",
					[
						{id: "Status_SaveBtn", label: "Save"},
						{id: "Status_ClearBtn", label: "Clear"},
						{id: "Status_CloseBtn", label: "Close"}
					]
				);
			</script>
			
			<!-- Async Monitor Popup -->									
			<div id="CaseMan_AsyncMonitorPopup" class="popup">
				<table id="popup_table">
					<tr class="hearing_header">
	        			<td align="center" class="hearing_heading" colspan="2">
	            			<div class="popup_header">Asynchronous Monitor</div>
	            		</td>
	        		</tr>
	        		<tr>
	        			<td>
							<script type="text/javascript">
								CaseManAsyncMonitorRenderer.createInline("CaseMan_AsyncMonitor", false);
							</script>
	            		</td>
	        		</tr>
				</table>
			</div>
			
			<!-- LOV Popups -->
			<script type="text/javascript">
				LOVPopupRenderer.createInline(
					"Lov_SearchResults",	"Payments",
					["Enforcement Type", "Transaction Number", "Enforcement Number"], 10, 1, true
				);
			</script>
																	
		</form>
	</body>
</html>
