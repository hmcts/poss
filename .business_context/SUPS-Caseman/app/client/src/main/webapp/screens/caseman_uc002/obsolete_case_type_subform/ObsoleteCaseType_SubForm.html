<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3c.org/TR/html4/strict.dtd">
<html>

	<head>
		<title>ObsoleteCaseType_SubForm</title>
		<link href="ObsoleteCaseType_SubForm.css" type="text/css" rel="stylesheet">
		<script type="text/javascript" src="../../../Framework.js"></script>
    	<script type="text/javascript" src="../../../CaseManSubFormIncludeFiles.js"></script>
		<script type="text/javascript" src="ObsoleteCaseType_SubForm.js"></script>
  	</head>

	<body>
	
    	<form id="obsoleteCaseTypeSubform" class="subform">

			<div class="panel">
				<table class="content" style="height:267px;">
					<tr>
						<td colspan=3 align="center">
							<label>This Case Type is no longer valid for BMS.  Please enter a new Case Type before continuing.  A list of values is available.</label>
						</td>
					</tr>
					
					<tr>
						<td align="center">
						
							<table>
								<tr>
									<td style="width:125px;" align="left"><label for='ObsoleteCaseType_OldCaseType'>Old Case Type</label></td>
									<td align="left">
										<input id="ObsoleteCaseType_OldCaseType" type="text" size=30>
									</td>
									<td align="left">&nbsp;</td>
								</tr>
								<tr>
									<td style="width:125px;" align="left"><label for='ObsoleteCaseType_NewCaseType'>New Case Type</label></td>
									<td align="left">
										<script type="text/javascript">
											AutoCompletionRenderer.createInline("ObsoleteCaseType_NewCaseType");
										</script>
									</td>
									<td align="left">
										&nbsp;<input id="ObsoleteCaseType_NewCaseTypeLOVButton" type="Button" value="LOV">
									</td>
								</tr>
							</table>

						</td>
					</tr>
				</table>
			</div>
			
			<!-- Subform action bar -->
			<script type="text/javascript">
				ActionBarRenderer.createInline(
					"obsoleteCaseType_statusbar",
					[
						{id: "ObsoleteCaseType_CloseButton", label: "Close"}
					]
				);
			</script>
			
			<!-- New Case Type LOV Button -->
			<script type="text/javascript">
				LOVPopupRenderer.createInline( 
					"ObsoleteCaseType_NewCaseTypeLOVGrid", 
					"New Case Type", 
					["Value", "Description"], 
					10, 
					1, 
					true 
				);
			</script>
			
		</form>
    
    </body>
    
</html>
