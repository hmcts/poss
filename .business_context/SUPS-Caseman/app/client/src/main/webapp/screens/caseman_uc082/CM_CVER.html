<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3c.org/TR/html4/strict.dtd">
<html>
	<head>
		<title>CM_CVER</title>
		<link rel="stylesheet" type="text/css" href="../caseman_oracle_reports/generated/OracleReports.css">
		<script type="text/javascript" src="../../Framework.js"></script>
		<script type="text/javascript" src="../../CaseManIncludeFiles.js"></script>
		<script src="../../StartOfDayUtils.js" type="text/javascript"></script>
		<script src="CM_CVER.js" type="text/javascript"></script>
		<script src="../../CaseManAsyncMonitorGUIAdaptor.js" type="text/javascript"></script>
		<script src="../../CaseManAsyncMonitorRenderer.js" type="text/javascript"></script>
	</head>
	
	<body tabindex="-1">
		<form action="#" name="OracleReportForm" id="OracleReportForm">
			<!-- Navigation -->
			<table class="CaseManMenuBar">
				<tr>
					<td>&nbsp;</td>
				</tr>
			</table>

			<table class="layout">
				<tr>
					<td class="alignCentre">
						<div class="panel">
							<table class="headercontent">
								<tr>
									<td class="alignCentre">
										<table>
											<tr>
												<td style="width: 150px" align="left"><label>Owning Court</label></td>
												<td style="width: 60px" align="left"><input size="5" type="text" id="OwningCourt_Code"></td>
												<td style="width: 20px" align="left"><input size="20" type="text" id="OwningCourt_Name"></td>
											</tr>
										</table>
									</td>
								</tr>
							</table>
						</div>
					</td>
				</tr>
				<tr>
					<td class="alignCentre">
						<div class="panel">
							<table class="content" style="height:534px;">
								<tr>
									<td class="alignCentre">
										<table>
											<tr>
												<td colspan="2" style="width: 650px" align="center">
													<label>Click on Run Report button to print this report.</label>
												</td>
											</tr>
										</table>
									</td>
								</tr>
							</table>
						</div>
					</td>
				</tr>
			</table>

			<script type="text/javascript">		
				ActionBarRenderer.createInline(
					"status_bar",
					[
						{id: "Status_RunReportButton", label: "Run Report"},
						{id: "Status_Close_Btn", label: "Close"}
					]
				);
			</script>
						
			<!-- Async Monitor Popup -->							
			<div id="CaseMan_AsyncMonitorPopup" class="popup">
				<table id="popup_table">
					<tr class="hearing_header">
						<td align="center" class="hearing_heading" colspan="2">
							<div class="popup_header">Asynchronous Monitor</div>
						</td>
					</tr>
					<tr>
						<td>
							<script type="text/javascript">
								CaseManAsyncMonitorRenderer.createInline("CaseMan_AsyncMonitor", false);
							</script>
						</td>
					</tr>
				</table>
			</div>
		</form>
	</body>
</html>
