<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3c.org/TR/html4/strict.dtd">

<html>

	<head>
		<title>ManageAEEvents</title>
		<link href="ManageAEEvents.css" type="text/css" rel="stylesheet">
		<script type="text/javascript" src="../../Framework.js"></script>
		<script type="text/javascript" src="../../ConcatCommon.js"></script>
		<script type="text/javascript" src="../caseman_wp/WordProcessing.js"></script>
		<script type="text/javascript" src="ManageAEEvents.js"></script>				
	</head>
	
	<body>
		<form name="ManageAEEvents" id="manageAEEvents">
	
			<!-- Framework Navigation Menu -->
			<script type="text/javascript">MenuBarRenderer.createInline();</script>
	
			<table class="layout">
	
				<!-- Query Panel -->
				<tr>
					<td>
						<div class="panel">
							<table class="content">
								<tr>
									<td>
										<table style="width: 100%;">
											<tr>
												<td class="defaultLabel"><label for='Query_CaseNumber'>Case Number</label></td>
												<td colspan=3><input id="Query_CaseNumber" type="text" size=15></td>
		
												<td class="defaultLabel"><label for='Query_AENumber'>AE Number</label></td>
												<td><input id="Query_AENumber" type="text" size=15></td>
												
												<td>&nbsp;</td>
											</tr>
											<tr>
												<td class="defaultLabel"><label for='Query_OwningCourtCode'>Owning Court</label></td>
												<td style="width:50px;"><input id="Query_OwningCourtCode" type="text" size="5"/></td>
												<td style="width:190px;">
													<script type="text/javascript">AutoCompletionRenderer.createInline("Query_OwningCourtName");</script>
												</td>
												<td style="width:87px;"><input id="Query_OwningCourtLOVButton" type="Button" value="LOV"/></td>
												<td colspan=2>&nbsp;</td>
												<td><input id="Query_SearchButton" type="button" value="Search"></td>
											</tr>
										</table>
									</td>			
								</tr>
							</table>
						</div>
					</td>
				</tr>
				<!-- End Query Panel -->
				
				<!-- Header Panel -->
				<tr>
					<td>
						<div class="panel">
							<table class="content">
								<tr>
									<td>
										<table>
											<tr>									
												<td class="defaultLabel"><label for='Header_ApplicationType'>Application Type</label></td>
												<td><input id="Header_ApplicationType" type="text" size=30></td>
												<td style="width:210px;">&nbsp;</td>
												<td><input id="Header_ObligationsExistButton" type="button" value="Obligations Exist"></td>
												<td>&nbsp;<input id="Header_PERNDRButton" type="button" value="PER/NDR Details"></td>
											</tr>
		
											<tr>
												<td class="defaultLabel"><label for='Header_JudgmentCreditor'>Judgment Creditor</label></td>
												<td><input id="Header_JudgmentCreditor" type="text" size=40></td>
												<td colspan=3>&nbsp;</td>
											</tr>
	
											<tr>
												<td class="defaultLabel"><label for='Header_JudgmentDebtor'>Judgment Debtor</label></td>
												<td><input id="Header_JudgmentDebtor" type="text" size=40></td>
												<td colspan=3>&nbsp;</td>
											</tr>
										</table>
									</td>			
								</tr>
		
							</table>
						</div>
	
					</td>
				</tr>
				<!-- End Header Panel -->
	
				<tr>
					<td>
					
						<div class="panel">
							<table class="content">
		
								<tr>
		
									<td style="width: 470px;">
		
										<table style="height:426px;">
		
											<tr>
												<td valign="top" colspan=4>
													<script type="text/javascript">Grid.createInline("Master_AEEventGrid", ["", "Date", "Event", "Event Description","Stage",""], 19, 1);</script>
												</td>
											</tr>
											<tr>
												<td colspan="4" align="right">
													<input id="Master_PreviousButton" type="Button" value="Previous" style="width: 70px; margin-right:5px;" />
													<input id="Master_NextButton" type="Button" value="Next" style="width: 70px; margin-right:5px;" />
												</td>
											</tr>
											<tr>
												<td style="margin-left:5px;" colspan="4">
													<label for='Master_AEEventId'>Select an Event</label>
												</td>
											</tr>
											<tr>
												<td style="width:5px;">&nbsp;</td>
												<td>
													<input id="Master_AEEventId" type="text" size=3>
												</td>
												<td>
													<script type="text/javascript">
														AutoCompletionRenderer.createInline("Master_AEEventDescription");
													</script>
												</td>
												<td align="right"><input id="Master_AEEventLOVButton" type="Button" value="LOV" style="margin-right:5px;"></td>
											</tr>
											<tr>
												<td align="right" colspan="4">
													<input id="Master_AddAEEventButton" type="Button" value="Add" style="margin-right:5px; margin-bottom: 2px;">
												</td>
											</tr>
		
										</table>
		
									</td>
		
									<td class="spacer">&nbsp;</td>
									
									<td valign="top">
										
										<table style="margin-top: 5px;">
											
											<tr>
												<td class="detailsLabel"><label for='EventDetails_DateReceived'>Date Received</label></td>
												<td>
													<script type="text/javascript">DatePickerRenderer.createInline("EventDetails_DateReceived", true);</script>
												</td>
											</tr>
											<tr>
												<td class="detailsLabel"><label for='EventDetails_EventId'>Event</label></td>
												<td>
													<input id="EventDetails_EventId" type="text" size=3>
													<input id="EventDetails_EventDescription" type="text" size=58>
												</td>
											</tr>
											<tr>
												<td class="detailsLabel"><label for='EventDetails_Stage'>Stage</label></td>
												<td>
													<input id="EventDetails_Stage" type="text" size=27>
												</td>
											</tr>
											<tr>
												<td class="detailsLabel"><label for='EventDetails_Details'>Event Details</label></td>
												<td>
													<script type="text/javascript">ZoomFieldRenderer.createInline("EventDetails_Details");</script>
												</td>
											</tr>
											<tr>
												<td class="detailsLabel"><label for='EventDetails_ErrorFlag'>Error</label></td>
												<td><input id="EventDetails_ErrorFlag" type="checkbox"></td>
											</tr>
											<tr>
												<td class="detailsLabel"><label for='EventDetails_Service'>Service</label></td>
												<td><select id="EventDetails_Service"></select></td>
											</tr>
											<tr>
												<td class="detailsLabel"><label for='EventDetails_BailiffId'>Bailiff Id</label></td>
												<td><input id="EventDetails_BailiffId" type="text" size=5></td>
											</tr>
											<tr>
												<td class="detailsLabel"><label for='EventDetails_ServiceDate'>Service Date</label></td>
												<td>
													<script type="text/javascript">DatePickerRenderer.createInline("EventDetails_ServiceDate", true);</script>
												</td>
											</tr>
											<tr>
												<td class="detailsLabel"><label for='EventDetails_CreatedBy'>Created By</label></td>
												<td><input id="EventDetails_CreatedBy" type="text" size=27></td>
											</tr>
											<tr>
												<td class="detailsLabel"><label for='EventDetails_Date'>Date</label></td>
												<td>
													<script type="text/javascript">DatePickerRenderer.createInline("EventDetails_Date", true);</script>
												</td>
											</tr>
											
										</table>
		
									</td>
		
								</tr>
		
							</table>
						</div>
	
					</td>
				</tr>
	
			</table>
	
			<!-- Status Bar Panel -->
			<script type="text/javascript">
				ActionBarRenderer.createInline(
					"status_bar",
					[
						{id: "Status_SaveButton", label: "Save"},
						{id: "Status_ClearButton", label: "Clear"},
						{id: "Status_CloseButton", label: "Close"}
					]
				);
			</script>
			   <!-- End Status Bar Panel -->
			
			<!--  Form Extension Popups -->
			
			<!-- Add New Event popup -->
			<div class="popup" id="AddEvent_Popup">
				<table class="content">
					<tr>
						<td class="popupLabel"><label for='AddEvent_DateReceived'>Date Received</label></td>
						<td colspan=2>
							<script type="text/javascript">DatePickerRenderer.createInline("AddEvent_DateReceived", true);</script>
						</td>
					</tr>
					<tr>
						<td class="popupLabel"><label for='AddEvent_EventId'>Event</label></td>
						<td colspan=2>
							<input id="AddEvent_EventId" type="text" size=3>&nbsp;
							<input id="AddEvent_EventDescription" type="text" size=62>
						</td>
					</tr>
					<tr>
						<td class="popupLabel"><label for='AddEvent_Stage'>Stage</label></td>
						<td><select id="AddEvent_Stage"></select></td>
					</tr>
					<tr>
						<td class="popupLabel"><label for='AddEvent_Details'>Event Details</label></td>
						<td>
							<script type="text/javascript">ZoomFieldRenderer.createInline("AddEvent_Details");</script>
						</td>
						<td><input id="AddEvent_DetailsLOVButton" type="Button" value="LOV" style="margin-right:15px;"></td>
					</tr>
					<tr>
						<td class="popupLabel"><label for='AddEvent_Service'>Service</label></td>
						<td><select id="AddEvent_Service"></select></td>
						<td>&nbsp;</td>
					</tr>
					<tr>
						<td class="popupLabel"><label for='AddEvent_BailiffId'>Bailiff Id</label></td>
						<td>
							<input id="AddEvent_BailiffId" type="text" size=5>
						</td>
						<td>&nbsp;</td>
					</tr>
					<tr>
						<td class="popupLabel"><label for='AddEvent_EventDate'>Date</label></td>
						<td colspan=2>
							<script type="text/javascript">DatePickerRenderer.createInline("AddEvent_EventDate", true);</script>
						</td>
					</tr>
					<tr style="height:2px;">
						<td colspan=3>&nbsp;</td>
					</tr>
					<tr>
						<td colspan=3 align="right">
							<input class="popupButton" type="button" value="Save" id="AddEvent_SaveButton">
							<input class="popupButton" type="button" value="Cancel" id="AddEvent_CancelButton">
						</td>
					</tr>
				</table>
			</div>
			<!-- End Add New Event popup -->
			
			<!-- Query popup -->
			<div id="QueryAE_Popup" class="popup">
			
				<div class="popupTitle">Select an AE Record</div>
					
				<div class="panel">
					<script type="text/javascript">Grid.createInline("QueryPopup_AENumberGrid", ["Case Number", "AE Number", "Judgment Debtor", "Address", "Live"], 10, 1 );</script>
				</div>
				
				<!-- Popup action bar -->
				<script type="text/javascript">
					ActionBarRenderer.createInlineNoStatusBar(
						"query_statusbar",
						[
							{id: "QueryPopup_OkButton", label: "Ok"},	
							{id: "QueryPopup_CancelButton", label: "Cancel"}
						]
					);
				</script>
					
			</div>
			<!-- End Query popup -->
	
			<!-- PER/NDR Details popup -->
			<div class="popup" id="PERNDRDetails_Popup">
				<table class="content">
					<tr>
						<td align="center" colspan=2><label for="PERNDRDetails_Popup">PER/NDR Details</label></td>
					</tr>
					<tr>
						<td style="width:225px;"><label for='PERNDRDetailsPopup_PERRate'>Protected Earnings Rate</label></td>
						<td>
							<input type="text" id="PERNDRDetailsPopup_PERRateCurrency" size="1">
							&nbsp;<input type="text" id="PERNDRDetailsPopup_PERRate" size="12">
						</td>
					</tr>
					<tr>
						<td style="width:225px;"><label for='PERNDRDetailsPopup_PERPeriod'>Protected Earnings Period</label></td>
						<td><select id="PERNDRDetailsPopup_PERPeriod"></select></td>
					</tr>
					<tr>
						<td style="width:225px;"><label for='PERNDRDetailsPopup_NDRRate'>Normal Deduction Rate</label></td>
						<td>
							<input type="text" id="PERNDRDetailsPopup_NDRRateCurrency" size="1">
							&nbsp;<input type="text" id="PERNDRDetailsPopup_NDRRate" size="12">
						</td>
					</tr>
					<tr>
						<td style="width:225px;"><label for='PERNDRDetailsPopup_NDRPeriod'>Normal Deduction Period</label></td>
						<td><select id="PERNDRDetailsPopup_NDRPeriod"></select></td>
					</tr>
					<tr style="height:2px;">
						<td>&nbsp;</td>
					</tr>
					<tr>
						<td align="right" colspan=2>
							<input class="popupButton" id="PERNDRDetailsPopup_OkButton" type="Button" value="Ok">
							<input class="popupButton" id="PERNDRDetailsPopup_CancelButton" type="Button" value="Cancel">
						</td>
					</tr>
				</table>
			</div>
			<!-- End PER/NDR Details popup -->

			<!-- Progress Indicator Popup (Oracle Reports) -->
			<div class="popup" id="ProgressIndicator_Popup">
				<div class="panel" id="ProgressIndicator_Panel">
					<table class="content" cellspacing="5">
						<tr>
							<td><label for="Progress_Bar">Generating Report</label></td>
						</tr>
						<tr>
							<td><input id="Progress_Bar" type="text" size="67"/></td>
						</tr>
						<tr>
							<td id="Progress_Status"></td>
						</tr>
					</table>
				</div>
				<div id="ProgressIndicator_ActionBarContainer">
					<script type="text/javascript">
						ActionBarRenderer.createInlineNoStatusBar(
							"ProgressIndicator_ActionBar",
							[
								{label: "Cancel", id: "Popup_Cancel"}
							]
						);	
					</script>	
				</div>
			</div>
			<!-- End Progress Indicator Popup -->
			
			<!-- Non-visual data change listeners -->
			<div class="logic" id="formLifecycleStateLogic"></div>
			<div class="superLogic" id="launchOutputLogic"></div>
			
			<!-- LOV POPUPs -->
			<script type="text/javascript">LOVSubformRenderer.createInline( "Query_OwningCourtLOVGrid", "Courts", ["Code", "Court"], 10, 1, true );</script>
			<script type="text/javascript">LOVSubformRenderer.createInline( "Master_AEEventLOVGrid", "Events", ["Event", "Description"], 10, 1, true );</script>
			<script type="text/javascript">LOVPopupRenderer.createInline( "AddEvent_DetailsLOVGrid", "Details", ["Value", "Description"], 10, 1, true );</script>
			
			<!-- Audit Panels -->
			<div class="auditPanel" id="PERNDRPanel"></div>
			<div class="auditPanel" id="currentlySelectedEventPanel"></div>
	
			<!-- AUDIT SELECTOR ADAPTOR -->
			<script type="text/javascript">AuditSelectorRenderer.createInline( "Audit_PanelSelector" );</script>
			
			<!-- SUBFORMS -->
			<div class="popup popupsubform" id="audit_subform"></div>
			<div class="popup popupsubform" id="selectEventOutput_subform"></div>
			<div class="popup popupsubform" id="ProgressBar_SubForm"></div>
			
		</form>
	
	</body>

</html>
