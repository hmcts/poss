<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3c.org/TR/html4/strict.dtd">
<html>
	<head>
		<title>OutstandingWarrantListReport</title>
		<link rel="stylesheet" type="text/css" href="../caseman_oracle_reports/generated/OracleReports.css">
		<link rel="stylesheet" type="text/css" href="../../CaseManStyleSheet.css">
		<script src="../../Framework.js" type="text/javascript"></script>
		<script type="text/javascript" src="../../CaseManIncludeFiles.js"></script>
		<script src="OutstandingWarrantListReport.js" type="text/javascript"></script>
	</head>
	<body tabindex="-1">
		<form action="#" name="OracleReportForm" id="OracleReportForm">
			<table class="CaseManMenuBar">
				<tr>
					 <td></td>
				</tr>
			</table>

			<table class="layout">
				<tr>
					<td class="alignCentre">
						<div class="panel">
							<table class="headercontent">
								<tr>
									<td class="alignCentre">
										<table>
											<tr>
												<td style="width: 150px" align="left"><label>Owning Court</label></td>
												<td style="width: 60px" align="left"><input size="5" type="text" id="OwningCourt_Code"></td>
												<td style="width: 20px" align="left"><input size="20" type="text" id="OwningCourt_Name"></td>
											</tr>
										</table>
									</td>
								</tr>
							</table>
						</div>
					</td>
				</tr>
				<tr>
					<td class="alignCentre">
						<div class="panel">
							<table class="content" style="height:534px;">
								<tr>
									<td class="alignCentre">
										<table>
											<tr>
												<td style="width: 200px" align="left"><label>Warrant Issued Before</label></td>
												<td class="alignLeft">
													<script type="text/javascript">
														DatePickerRenderer.createInline("IssueDate", false);
													</script>
												</td>
											</tr>
											<tr>
												<td style="width: 200px" align="left"><label>Minimum Warrant Amount</label></td>
												<td class="alignLeft">
													<input id="DefaultCurrency" type="text" size="1"/>
													<input id="WarrantAmount" type="text" size="8"/>
												</td>
											</tr>
											<tr>
												<td style="width: 200px" align="left"><label>Bailiff Id</label></td>
												<td class="alignLeft"><input id="BailiffId" type="text" size="2"/></td>
											</tr>
											<tr>
												<td style="width: 200px" align="left"><label>Warrant Type</label></td>
												<td class="alignLeft">
													<input id="WarrantType" type="text" size="10"/>
													<input id="WarrantTypeLOVButton" type="Button" value="LOV"/>
												</td>
											</tr>
											<tr>
												<td style="width: 200px" align="left"><label>Return Class</label></td>
												<td class="alignLeft"><input id="ReturnClass" type="text" size="1"/></td>
											</tr>
										</table>
									</td>
								</tr>
							</table>
						</div>
					</td>
				</tr>
			</table>

			<!-- Status Bar -->
			<script type="text/javascript">		
				ActionBarRenderer.createInline(
					"status_bar",
					[
						{id: "Status_RunReportButton", label: "Run Report"},
						{id: "Status_Close_Btn", label: "Close"}
					]
				);
			</script>
													
			<div id="ProgressIndicator_Popup" class="popup">
				<div id="ProgressIndicator_Panel" class="panel">
					<table class="content" cellspacing="5">
						<tr>
							<td><label for="Progress_Bar">Generating Report</label></td>
						</tr>
						<tr>
							<td><input size="67" type="text" id="Progress_Bar"></td>
						</tr>
						<tr>
							<td id="Progress_Status"></td>
						</tr>
					</table>
				</div>
				<div id="ProgressIndicator_ActionBarContainer">
					<script type="text/javascript">
						ActionBarRenderer.createInlineNoStatusBar(
							"ProgressIndicator_ActionBar",
							[
								{label: "Cancel", id: "Popup_Cancel"}
							]
						);	
					</script>
				</div>
			</div>
								
			<!-- LOV Popups -->
			<script type="text/javascript">
				LOVPopupRenderer.createInline( "WarrantTypeLOVGrid", "Warrant Types", ["Type", "Description"], 10, 1, true );	
			</script>

		</form>
	</body>
</html>
