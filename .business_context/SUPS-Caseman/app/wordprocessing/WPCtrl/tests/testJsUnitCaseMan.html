	<script language="JavaScript" type="text/javascript">
			
			var wpctrl = null;

			// JsUnit Assertion Tests		
			function init()
			{

			}
			
			var tests = [
						"testCreateController",
						"testGetInstance",
						"testConfigureController",
						"testConfigureControllerXPaths"
						];
			
			
			function testCreateController()
			{	
				wpctrl = new CaseManWPCtrl();
				assertNotNull("wpctrl MUST NOT be null after initialisation", wpctrl);	
			}
			function testGetInstance()
			{
				var inst = WPCtrl.GetInstance();
				assertEquals("WPCtrl.GetInstance() returns unexpected singleton instance", wpctrl, inst);
			}

			function testConfigureController()
			{
				var cfg = wpctr.getConfigXML();
				assertNotNull("WPCtrl.prototype.getConfigXML() returns null configxml", cfg);
			}			
				
			function testConfigureControllerXPaths()
			{
				assertEquals("testConfigureControllerXPaths fails - CaseNumber xpath incorrect", "WordProcessing/Case/CaseNumber",CaseManWPXPath.CaseNumber);
				assertEquals("testConfigureControllerXPaths fails - CaseType xpath incorrect", "WordProcessing/Case/CaseType",CaseManWPXPath.CaseType);
				assertEquals("testConfigureControllerXPaths fails - StandardEventId xpath incorrect", "WordProcessing/Event/StandardEventId",CaseManWPXPath.EventStandardId);
				assertEquals("testConfigureControllerXPaths fails - EventPK xpath incorrect", "WordProcessing/Event/CaseEventSeq",CaseManWPXPath.EventPK);
			}	

			function setup()
			{
			}		
			
			function teardown()
			{
				//Services.removeNode('/ds/data');
			}	

			function loadFromFile(fileName)
			{
				var dom = XML.createDOM(null, null, null);
				dom.load(fileName);
				Services.removeNode('/ds/data');
				Services.addNode(dom, '/ds');
			}

			
			dumpProperties = function(object, msg)
			{
				var cons;
				try {
					cons = object.constructor.toString();
				}
				catch(e) {
					cons = "unknown";
				}

				var propNames = "";
				var lines = 0;
				for(var name in object)
				{
					var propValue;
					try{
					  if(object[name] == undefined)
					  	propValue = "undefined";
					  else
					  		propValue = object[name].toString();
					}
					catch(e)
					{
					  propValue = "unknown";
					}
					propNames += name + ": " + propValue + "\n";

					lines++;
					if(lines > 10)
					{
						alert(msg + "class: " + cons + "\n" + propNames);
						lines = 0;
						propNames = "";
					}

				}

				var output = msg + "class: " + cons + "\n" + propNames;
				alert(output);
				Logging.logMessage(output, Logging.LOGGING_LEVEL_TRACE);
			}
		</script>
